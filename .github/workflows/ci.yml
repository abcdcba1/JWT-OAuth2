#ワークフロー名指定
name: CI
# ワークフローが稼働する条件
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest # 実行環境指定
    # 実行ステップ指定
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with gradlew
        run: ./gradlew clean build
